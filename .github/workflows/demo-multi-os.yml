name: UOS操作系统CD测试
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: 在 ${{ matrix.os }} 上测试
    strategy:
      fail-fast: false
      matrix:
        os: [uos-professional-V20-1070,uos-professional-V25-2500u1]
    runs-on: ${{ matrix.os }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 显示系统信息
        run: |
          echo "当前系统: ${{ matrix.os }}"
          uname -a 2>/dev/null || ver 2>/dev/null || echo "macOS"
